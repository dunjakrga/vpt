<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Virtual Paint</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a1a; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: sans-serif; color: #fff; }
    h1 { font-size: 22px; font-weight: 500; margin-bottom: 16px; }

    #placeholder { width: 640px; max-width: 100vw; aspect-ratio: 4/3; background: #2a2a2a; border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; }
    #startBtn { padding: 10px 28px; font-size: 15px; border-radius: 8px; cursor: pointer; border: 1px solid #555; background: #333; color: #fff; }
    #startBtn:hover { background: #444; }

    #videoWrapper { display: none; position: relative; width: 640px; max-width: 100vw; border-radius: 12px; overflow: hidden; background: #000; aspect-ratio: 4/3; }
    video, #overlayCanvas, #drawCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    video { transform: none; }
    #overlayCanvas { pointer-events: none; }

    #controls { display: none; align-items: center; gap: 10px; margin-top: 12px; flex-wrap: wrap; justify-content: center; width: 640px; max-width: 100vw; }
    .colorBtn { width: 36px; height: 36px; border-radius: 50%; border: 3px solid transparent; cursor: pointer; transition: transform 0.1s; }
    .colorBtn.active { border-color: #fff; transform: scale(1.15); }
    .eraserBtn { border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; }
    #clearBtn, #saveBtn { padding: 8px 16px; font-size: 13px; border-radius: 8px; cursor: pointer; border: 1px solid #555; background: #333; color: #fff; }
    #clearBtn:hover, #saveBtn:hover { background: #444; }
    #brushWrap { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #aaa; margin-left: auto; }
    #brushRange { width: 80px; }

    #gestureHint { font-size: 12px; color: #666; margin-top: 8px; }
    #status { font-size: 13px; color: #aaa; margin-top: 6px; min-height: 20px; }
  </style>
</head>
<body>

  <h1>Virtual Paint</h1>

  <div id="placeholder">
    <p style="font-size: 15px; color: #aaa;">Draw with your finger</p>
    <button id="startBtn">Enable Camera</button>
    <p style="font-size: 12px; color: #666;">Requires webcam access</p>
  </div>

  <div id="videoWrapper">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="drawCanvas"></canvas>
    <canvas id="overlayCanvas"></canvas>
  </div>

  <div id="controls">
    <button class="colorBtn active" data-color="#2563eb" style="background:#2563eb;" title="Blue"></button>
    <button class="colorBtn" data-color="#16a34a" style="background:#16a34a;" title="Green"></button>
    <button class="colorBtn" data-color="#dc2626" style="background:#dc2626;" title="Red"></button>
    <button class="colorBtn" data-color="#eab308" style="background:#eab308;" title="Yellow"></button>
    <button class="colorBtn" data-color="#f97316" style="background:#f97316;" title="Orange"></button>
    <button class="colorBtn" data-color="#ffffff" style="background:#ffffff;" title="White"></button>
    <button class="colorBtn eraserBtn" data-color="#000" data-eraser="true" style="background:#333; color:#fff;" title="Eraser">E</button>
    <button id="clearBtn">Clear</button>
    <button id="saveBtn">Save</button>
    <div id="brushWrap">
      <span>Size</span>
      <input type="range" id="brushRange" min="2" max="40" value="7" step="1">
      <span id="brushVal">7</span>
    </div>
  </div>

  <p id="gestureHint">☝ Draw &nbsp;|&nbsp; ✌ Pause &nbsp;|&nbsp; 🤟 3 fingers + pinch = size &nbsp;|&nbsp; ✋ 4 fingers = color</p>
  <p id="status"></p>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
  <script src="app.js"></script>
</body>
</html>
